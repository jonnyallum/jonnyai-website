<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="1200" height="1200" role="img" aria-label="HubSuite hero">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#5b8def" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#8a5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20b2b2"/>
      <stop offset="45%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#7c4fe8"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="280" fill="url(#glow)"/>

  <g stroke="url(#grad)" stroke-width="1.4" opacity="0.45">
    <line x1="120" y1="120" x2="300" y2="300"/>
    <line x1="480" y1="120" x2="300" y2="300"/>
    <line x1="120" y1="480" x2="300" y2="300"/>
    <line x1="480" y1="480" x2="300" y2="300"/>
    <line x1="200" y1="80"  x2="400" y2="80"/>
    <line x1="200" y1="520" x2="400" y2="520"/>
  </g>
  <g fill="url(#grad)">
    <circle cx="120" cy="120" r="4"/>
    <circle cx="480" cy="120" r="4"/>
    <circle cx="120" cy="480" r="4"/>
    <circle cx="480" cy="480" r="4"/>
    <circle cx="200" cy="80"  r="3"/>
    <circle cx="400" cy="80"  r="3"/>
    <circle cx="200" cy="520" r="3"/>
    <circle cx="400" cy="520" r="3"/>
  </g>

  <path
    d="M300 470
       C 180 380, 110 290, 160 200
       C 200 140, 270 150, 300 200
       C 330 150, 400 140, 440 200
       C 490 290, 420 380, 300 470 Z"
    fill="none"
    stroke="url(#grad)"
    stroke-width="4"
    opacity="0.7"/>

  <g stroke="url(#grad)" stroke-width="22" stroke-linecap="round" fill="none" filter="url(#soft)">
    <line x1="220" y1="220" x2="220" y2="380"/>
    <line x1="380" y1="220" x2="380" y2="380"/>
    <line x1="220" y1="300" x2="380" y2="300"/>
  </g>
</svg>
