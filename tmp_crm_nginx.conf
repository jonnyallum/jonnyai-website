server {
    server_name crm.jonnyai.co.uk;

    location / {
        proxy_pass http://localhost:3000; # Twenty CRM Server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Increase upload size for assets/logo
    client_max_body_size 20M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/crm.jonnyai.co.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/crm.jonnyai.co.uk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = crm.jonnyai.co.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name crm.jonnyai.co.uk;

    listen 80;
    return 404; # managed by Certbot


}